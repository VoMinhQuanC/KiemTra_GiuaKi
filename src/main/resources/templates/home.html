<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Hệ Thống Đăng Ký Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/" style="letter-spacing: 1px;">
            <span class="text-warning">SPRING BOOT</span> <span class="fw-light">Course Registration</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link btn btn-outline-success text-success px-3 fw-bold ms-2"
                       th:href="@{/register}"
                       style="border-width: 2px; border-radius: 8px;">
                        📝 Đăng Ký
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link fw-bold ms-2" th:href="@{/login}">Đăng nhập</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link btn btn-outline-warning text-warning px-3 fw-bold ms-3"
                       th:href="@{/admin/courses}"
                       style="border-width: 2px; border-radius: 8px;">
                        ⚙️ Admin
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="text-center mb-4">Danh Sách Học Phần</h2>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="course : ${courses}">
            <div class="card h-100 shadow-sm">
                <img th:src="${course.image != null && !course.image.isEmpty() ? course.image : 'https://via.placeholder.com/400x250?text=No+Image'}"
                     class="card-img-top" alt="Hình minh họa" style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${course.name}">Tên học phần</h5>
                    <p class="card-text mb-1"><strong>Số tín chỉ:</strong> <span th:text="${course.credits}">3</span></p>
                    <p class="card-text"><strong>Giảng viên:</strong> <span th:text="${course.lecturer}">Tên giảng viên</span></p>
                </div>
                <div class="card-footer bg-white border-top-0">
                    <a href="#" class="btn btn-outline-success w-100">Chi tiết</a>
                </div>
            </div>
        </div>
    </div>

    <nav aria-label="Page navigation" class="mt-5" th:if="${totalPages > 0}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${currentPage - 1})}">Trước</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link" th:href="@{/home(page=${i})}" th:text="${i + 1}">1</a>
            </li>

            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${currentPage + 1})}">Sau</a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
