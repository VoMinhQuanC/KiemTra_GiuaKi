<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0" style="border-radius: 15px;">
                <div class="card-header bg-success text-white text-center py-3" style="border-radius: 15px 15px 0 0;">
                    <h4 class="mb-0">ĐĂNG KÝ TÀI KHOẢN</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/register/save}" th:object="${user}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên đăng nhập</label>
                            <input type="text" th:field="*{username}" class="form-control" required placeholder="Nhập tên đăng nhập">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required placeholder="example@gmail.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" required placeholder="Nhập mật khẩu">
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success fw-bold">ĐĂNG KÝ NGAY</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
