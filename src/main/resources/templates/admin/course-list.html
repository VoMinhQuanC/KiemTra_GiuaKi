<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản Lý Học Phần</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">🏠 Về Trang Chủ</a>
    <span class="navbar-text text-white">Trang Quản Trị ADMIN</span>
  </div>
</nav>

<div class="container bg-white p-4 rounded shadow-sm">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary">Danh Sách Học Phần (ADMIN)</h2>
    <a th:href="@{/admin/courses/create}" class="btn btn-success">+ Thêm Mới Học Phần</a>
  </div>

  <table class="table table-hover table-bordered align-middle">
    <thead class="table-dark">
    <tr>
      <th class="text-center">ID</th>
      <th>Tên học phần</th>
      <th class="text-center">Hình ảnh</th>
      <th class="text-center">Số tín chỉ</th>
      <th>Giảng viên</th>
      <th class="text-center">Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="course : ${courses}">
      <td class="text-center" th:text="${course.id}">1</td>
      <td class="fw-bold" th:text="${course.name}">Tên Môn</td>
      <td class="text-center">
        <img th:if="${course.image != null && !course.image.isEmpty()}"
             th:src="${course.image}" alt="Img" style="width: 60px; height: 40px; object-fit: cover; border-radius: 4px;">
        <span th:unless="${course.image != null && !course.image.isEmpty()}" class="text-muted small">Trống</span>
      </td>
      <td class="text-center" th:text="${course.credits}">3</td>
      <td th:text="${course.lecturer}">Tên GV</td>
      <td class="text-center">
        <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-outline-primary me-2">Sửa</a>
        <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-outline-danger"
           onclick="return confirm('Bạn có chắc chắn muốn xóa học phần này không?');">Xóa</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
