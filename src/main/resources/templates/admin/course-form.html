<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập Nhật Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${course.id == null ? 'Thêm Mới Học Phần' : 'Chỉnh Sửa Học Phần'}">Tiêu đề Form</h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/admin/courses/save}" th:object="${course}" method="POST">

                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên học phần (*)</label>
                            <input type="text" class="form-control" th:field="*{name}" required placeholder="Ví dụ: Lập trình Java">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Link hình ảnh minh họa</label>
                            <input type="text" class="form-control" th:field="*{image}" placeholder="Nhập đường dẫn URL ảnh (nếu có)">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Số tín chỉ (*)</label>
                                <input type="number" class="form-control" th:field="*{credits}" required min="1" max="10">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Giảng viên</label>
                                <input type="text" class="form-control" th:field="*{lecturer}" placeholder="Tên giảng viên phụ trách">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end mt-4">
                            <a th:href="@{/admin/courses}" class="btn btn-secondary me-2">Hủy bỏ</a>
                            <button type="submit" class="btn btn-success">💾 Lưu Thông Tin</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
